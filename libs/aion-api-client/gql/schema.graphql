"Describes API authentication requirements."
directive @auth("which authenticated subjects have access"
subjectType: String, "which roles have access"
roles: [String]) on QUERY | MUTATION
"Marks a fragment as being optionally deferrable. Allowing the backend to split the query and return non-deferred parts first. This implicitly uses a streaming transport protocol which requires client support."
directive @defer(if: Boolean, label: String) on FRAGMENT_SPREAD | INLINE_FRAGMENT

schema {
  query: Queries
  mutation: Mutations
  subscription: Subscriptions
}
scalar Json
scalar Long
"""

An identifier established by the Client that MUST contain a String, Number,
or NULL value if included. If it is not included it is assumed to be a
notification. The value SHOULD NOT be NULL for requests expecting a response,
and Numbers SHOULD NOT contain fractional parts. The Server MUST reply with
the same value in the Response object if included. This member is used to
correlate the context between the two objects. A2A methods typically expect a
response or stream, so id will usually be present and non-null.
        
"""
scalar RequestCorrelationId

union A2AJsonRpcResponseGQL = A2AJsonRpcErrorResponseGQL | A2AJsonRpcSuccessResponseGQL

union ChatCompletionStreamChunk = ChatCompletionStreamError | ChatCompletionStreamResponseChunk

"Indicates whether the behavior is managed within the platform or represents an external integration"
enum AgentBehaviorKind {
  A2ADeployment
  AionDeployment
  Distribution
  System
}

"JSON-RPC request envelope for agent-to-agent workflows"
input A2AJsonRpcRequestGQLInput {
  "JSON-RPC protocol version, defaults to 2.0"
  jsonrpc: String!
  "Method invoked on the destination agent"
  method: String!
  "Parameters forwarded to the method call"
  params: Json
  "Identifier for correlating responses to the request. May be a string or a number."
  id: RequestCorrelationId
}

"Key/value pair describing an A2A service parameter"
input A2AServiceParameterGQLInput {
  "Service parameter key (case-insensitive)"
  key: String!
  "Service parameter value"
  value: String!
}

"Service parameters associated with an A2A request"
input A2AServiceParametersGQLInput {
  "A2A protocol version requested by the client"
  version: String
  "Extension URIs requested by the client"
  extensions: [String!]
  "Additional service parameters"
  additional: [A2AServiceParameterGQLInput!]
}

"Select exactly one A2A ingress target. Supplying zero or multiple selectors causes the request to be rejected."
input A2ATargetGQLInput {
  "Direct distribution identifier. Targets the external ingress path for a distribution-backed agent sequence."
  distributionId: ID
  "Direct agent environment identifier. Targets the daemon for the specific project node instance represented by that environment. The authenticated user will require privileged access."
  agentEnvironmentId: ID
  "Agent identity identifier for identity-addressed ingress. Personal or principal identities resolve to an A2A distribution endpoint, while daemon identities resolve directly to the component daemon."
  agentIdentityId: ID
  "Agent @name handle for identity-addressed ingress. Values may be provided with or without the leading @ symbol. Personal or principal identities resolve to an A2A distribution endpoint, while daemon identities resolve directly to the project node's daemon."
  agentAtName: String
}

input MessageInput {
  role: String!
  content: String!
}

type A2AJsonRpcError {
  code: Int!
  message: String!
  data: Json
}

type A2AJsonRpcErrorResponseGQL {
  "Identifier correlating the response to its request"
  id: RequestCorrelationId
  error: A2AJsonRpcError!
  jsonrpc: String!
}

type A2AJsonRpcSuccessResponseGQL {
  "Identifier correlating the response to its request"
  id: RequestCorrelationId
  result: Json!
  jsonrpc: String!
}

"Core persisted configuration for one agent behavior"
type AgentBehavior {
  "Unique identifier for the behavior"
  id: ID!
  "Organization that owns this behavior"
  organizationId: ID!
  "Associated deployment for this behavior"
  deploymentId: ID!
  "Version of the deployment used by the behavior"
  versionId: ID!
  "Lifecycle state of this behavior"
  kind: AgentBehaviorKind!
  "the semantic version defined for the behavior by the developer in the Aion.yaml config."
  logicalVersion: String!
  "the developer-assigned name of the behavior from the Aion.yaml or AgentCard. Set to the behaviorKey if not found."
  name: String!
  "Optional developer-assigned name of the behavior from the Aion.yaml or AgentCard."
  description: String
  "Schema describing the configuration variables"
  configurationSchema: Json
  "Optional AgentCard manifest describing this behavior"
  agentCard: Json
  "Stable identifier for the behavior across versions"
  behaviorKey: String!
}

type ChatCompletionStreamChoice {
  index: Int!
  delta: Delta!
  finish_reason: String
}

type ChatCompletionStreamError {
  message: String!
}

type ChatCompletionStreamResponse {
  id: String!
  created: Long!
  model: String!
  choices: [ChatCompletionStreamChoice!]!
}

type ChatCompletionStreamResponseChunk {
  response: ChatCompletionStreamResponse!
}

type Delta {
  role: String
  content: String
}

type Mutations {
  "Registers behavior metadata for a deployment version. Runtime metadata is resolved according to the deployment type."
  registerVersion("Identifier of the version being registered. This is required when authenticating as a User. When authenticating as a Version, this query will only register the Version connected to your credentials." versionId: ID): [AgentBehavior!]
}

type Queries {
  "Resolves a version identifier for the supplied client id."
  versionIdByClientId("Client identifier to resolve" clientId: ID!): ID
}

type Subscriptions {
  "Executes an agent-to-agent JSON-RPC request and streams the responses."
  a2aRpc("JSON-RPC request body" request: A2AJsonRpcRequestGQLInput!, "A2A ingress target" target: A2ATargetGQLInput!, "Service parameters associated with the request" serviceParameters: A2AServiceParametersGQLInput): A2AJsonRpcResponseGQL
  "Streams delta chunks for an LLM chat-completion request. When `stream=true` is set, the underlying model returns partial responses; this subscription forwards those chunks to the client as they become available, enabling token-level streaming UIs."
  chatCompletionStream(model: String!, messages: [MessageInput!]!, stream: Boolean!): ChatCompletionStreamChunk @auth(subjectType: "Version")
}