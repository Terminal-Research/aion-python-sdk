subscription ChatCompletionStream(
  $request: ChatCompletionRequestInput!
  $principal: String
) {
  chatCompletionStream(request: $request, principal: $principal) {
    __typename
    ... on ChatCompletionStreamResponseChunk {
      response {
        id
        created
        model
        choices {
          index
          delta {
            role
            content
          }
          finishReason
        }
      }
    }
    ... on ChatCompletionStreamError {
      message
    }
  }
}

subscription A2AStream(
  $request: A2AJsonRpcRequestGQLInput!
  $target: CapabilitySubjectGQLInput!
  $principal: String
) {
  a2aRpc(request: $request, target: $target, principal: $principal) {
    __typename
    ... on A2AJsonRpcSuccessResponseGQL {
      id
      result
    }
    ... on A2AJsonRpcErrorResponseGQL {
      errorId: id
      error {
        code
        message
        data
      }
    }
  }
}

subscription VersionLogs($startTime: OffsetDateTime!) {
  versionLogs(startTime: $startTime) {
    level
    level_value
    timestamp
    message
    properties {
      key
      value
    }
  }
}
